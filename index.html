<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Seni seviyorumm adamımm</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

.container {
    position: relative;
    z-index: 2; /* civciv üstte kalsın */
}

img {
    width: 220px;
}

h1 {
    color: #ff4da6;
    margin-top: 15px;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: red; /* başlangıç rengi */
    border-radius: 50%;
    animation: confetti-fall linear;
    opacity: 0.9;
}

@keyframes confetti-fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <img src="civciv.gif" alt="civciv">
    <h1>Seni çokk seviyorum bebeğimm iyi ki varsınn 💕</h1>
</div>

<script>
function createConfetti() {
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");

    // Ekranın herhangi bir yerinden çıkacak
    confetti.style.left = Math.random() * window.innerWidth + "px";

    // Rastgele renk
    const colors = ["#ff4da6", "#ffdb4d", "#4dff4d", "#4dffff", "#ff4d4d", "#b84dff"];
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

    // Rastgele boyut
    const size = Math.random() * 8 + 6; // 6-14px
    confetti.style.width = size + "px";
    confetti.style.height = size + "px";

    // Rastgele hız
    const duration = Math.random() * 2 + 1; // 1-3 saniye
    confetti.style.animationDuration = duration + "s";

    document.body.appendChild(confetti);

    // Bitince sil
    setTimeout(() => confetti.remove(), duration * 1000);
}

// Yoğunluğu artırmak için aralığı azalt
setInterval(createConfetti, 100);
</script>

</body>
</html>
