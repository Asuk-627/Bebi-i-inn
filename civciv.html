<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Affet benii bebii</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden; /* taşan gözyaşlarını gizler */
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 2; /* civciv üstte kalsın */
        }

        img {
            width: 220px;
        }

        h1 {
            color: #ff4da6;
            margin-top: 15px;
        }

        .tear {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #4da6ff;
            border-radius: 50%;
            animation: fall linear;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <img src="civciv.gif" alt="civciv">
    <h1>Bebeğimm çok özür dilerim seni kırmak istememiştimm :( seni çok seviyorumm </h1>
</div>

<script>
    function createTear() {
        const tear = document.createElement("div");
        tear.classList.add("tear");

        // rastgele yatay konum (tüm ekran)
        tear.style.left = Math.random() * window.innerWidth + "px";

        // rastgele hız
        const duration = Math.random() * 1 + 1; // 1-2 saniye
        tear.style.animationDuration = duration + "s";

        document.body.appendChild(tear);

        setTimeout(() => {
            tear.remove();
        }, duration * 1000);
    }

    // DAHA YOĞUN YAĞMUR
    setInterval(createTear, 50);
</script>

</body>
</html>
